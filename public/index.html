<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智谱 arXiv 论文列表</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f8fafc;
        --card: #ffffff;
        --foreground: #0f172a;
        --muted: #64748b;
        --muted-bg: #f1f5f9;
        --border: #e2e8f0;
        --accent: #0f172a;
        --accent-soft: #eef2ff;
        --accent-line: #c7d2fe;
        --ring: rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        background-image:
          radial-gradient(circle at top left, rgba(99, 102, 241, 0.1), transparent 28rem),
          radial-gradient(circle at 80% 0, rgba(14, 165, 233, 0.08), transparent 24rem);
        color: var(--foreground);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 12px;
      }

      header {
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(16px);
        padding: 18px 24px 16px;
      }

      .wrap {
        max-width: 1480px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(20px, 2.4vw, 28px);
        letter-spacing: -0.04em;
        line-height: 1.15;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      main {
        max-width: 1480px;
        margin: 14px auto 40px;
        padding: 0 24px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 16px 48px rgba(15, 23, 42, 0.06);
        padding: 12px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .stat {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        background: linear-gradient(180deg, #ffffff, #f8fafc);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
      }

      .stat b {
        display: block;
        color: var(--foreground);
        font-size: 17px;
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .stat span {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr 170px;
        gap: 8px;
        margin: 10px 0;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 8px 10px;
        font: inherit;
        background: white;
        color: var(--foreground);
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--ring);
        outline: none;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
        max-width: 100%;
      }

      table {
        width: 100%;
        min-width: 1080px;
        table-layout: fixed;
        border-collapse: collapse;
        background: white;
        font-size: 11.5px;
      }

      th,
      td {
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        text-align: left;
      }

      th {
        position: sticky;
        top: 0;
        background: #f8fafc;
        color: var(--muted);
        z-index: 1;
        height: 30px;
        font-size: 11px;
        font-weight: 650;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      tbody tr:hover td {
        background: #f8fafc;
      }

      .title {
        color: var(--foreground);
        font-size: 12px;
        font-weight: 680;
        line-height: 1.22;
      }

      .translation {
        color: var(--muted);
        line-height: 1.22;
        margin-top: 2px;
      }

      .authors {
        color: #3f3f46;
      }

      .id-pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #f8fafc;
        color: #27272a;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
        font-size: 10.5px;
        line-height: 1;
        padding: 3px 6px;
        white-space: nowrap;
      }

      .links {
        white-space: nowrap;
      }

      .date-cell {
        white-space: nowrap;
      }

      .truncate {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      a {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 7px;
        background: white;
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }

      a:hover {
        border-color: var(--accent-line);
        background: var(--accent-soft);
        text-decoration: none;
      }

      .empty,
      .meta {
        color: var(--muted);
      }

      .meta {
        font-size: 11.5px;
        margin: 0 0 8px;
      }

      .tooltip {
        position: fixed;
        z-index: 50;
        display: none;
        max-width: min(680px, calc(100vw - 32px));
        padding: 9px 11px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0f172a;
        box-shadow: 0 14px 42px rgba(15, 23, 42, 0.22);
        color: white;
        font-size: 12px;
        line-height: 1.45;
        pointer-events: none;
        white-space: pre-wrap;
      }

      @media (max-width: 760px) {
        .stats,
        .toolbar {
          grid-template-columns: 1fr;
        }

        main {
          padding: 0 14px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <h1>智谱 arXiv 论文列表</h1>
        <p class="subtitle">
          基于指定作者、模型关键词和 GLM 审核规则自动更新。页面只展示最终收录论文。
        </p>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="stats" id="stats"></div>
        <div class="toolbar">
          <input id="search" type="search" placeholder="搜索标题、作者、汉译或 arXiv ID" />
          <select id="year">
            <option value="">全部年份</option>
          </select>
        </div>
        <p class="meta" id="meta">加载中...</p>
        <div class="table-wrap">
          <table>
            <colgroup>
              <col style="width: 52%" />
              <col style="width: 22%" />
              <col style="width: 9%" />
              <col style="width: 8%" />
              <col style="width: 9%" />
            </colgroup>
            <thead>
              <tr>
                <th>论文</th>
                <th>作者</th>
                <th>arXiv 号</th>
                <th>发表时间</th>
                <th>链接</th>
              </tr>
            </thead>
            <tbody id="papers"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const state = { rows: [], summary: {} };
      const $ = (id) => document.getElementById(id);

      function formatDate(value) {
        return value || "";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderStats(summary) {
        const items = [
          ["最终收录", summary.final_count],
          ["至少两人命中", summary.at_least_two_people],
          ["规则直接收录", summary.automatic_include],
          ["LLM 通过", summary.probability_approved_by_llm],
        ];
        $("stats").innerHTML = items
          .map(([label, value]) => `<div class="stat"><b>${value ?? "-"}</b><span>${label}</span></div>`)
          .join("");
      }

      function renderYears(rows) {
        const years = [...new Set(rows.map((row) => row.published.slice(0, 4)))].sort().reverse();
        $("year").insertAdjacentHTML(
          "beforeend",
          years.map((year) => `<option value="${year}">${year}</option>`).join("")
        );
      }

      function render() {
        const query = $("search").value.trim().toLowerCase();
        const year = $("year").value;
        const rows = state.rows.filter((row) => {
          const haystack = [
            row.title,
            row.authors,
            row.translated_title,
            row.arxiv_id,
          ]
            .join(" ")
            .toLowerCase();
          return (!year || row.published.startsWith(year)) && (!query || haystack.includes(query));
        });

        $("meta").textContent = `显示 ${rows.length} / ${state.rows.length} 篇；更新于 ${
          state.summary.updated_at ? new Date(state.summary.updated_at).toLocaleString("zh-CN") : "未知"
        }`;

        $("papers").innerHTML =
          rows
            .map((row) => {
              const title = escapeHtml(row.title);
              const translatedTitle = escapeHtml(row.translated_title || "");
              const authors = escapeHtml(row.authors);
              const arxivId = escapeHtml(row.arxiv_id);
              const published = escapeHtml(formatDate(row.published));
              const arxivUrl = escapeHtml(row.arxiv_url);
              const pdfUrl = escapeHtml(row.pdf_url);
              return `
                <tr>
                  <td>
                    <span class="title truncate has-tooltip" data-tooltip="${title}\n${translatedTitle}">${title}</span>
                    <span class="translation truncate has-tooltip" data-tooltip="${title}\n${translatedTitle}">${translatedTitle}</span>
                  </td>
                  <td><span class="authors truncate has-tooltip" data-tooltip="${authors}">${authors}</span></td>
                  <td><span class="id-pill">${arxivId}</span></td>
                  <td class="date-cell">${published}</td>
                  <td class="links">
                    <a href="${arxivUrl}" target="_blank" rel="noreferrer">arXiv</a>
                    ·
                    <a href="${pdfUrl}" target="_blank" rel="noreferrer">PDF</a>
                  </td>
                </tr>`;
            })
            .join("") || `<tr><td colspan="5" class="empty">没有匹配结果</td></tr>`;
      }

      fetch("./data/zhipu_papers.json", { cache: "no-store" })
        .then((response) => response.json())
        .then((data) => {
          state.rows = data.rows || [];
          state.summary = data.summary || {};
          renderStats(state.summary);
          renderYears(state.rows);
          render();
        })
        .catch((error) => {
          $("meta").textContent = `加载失败：${error.message}`;
        });

      $("search").addEventListener("input", render);
      $("year").addEventListener("change", render);

      const tooltip = document.createElement("div");
      tooltip.className = "tooltip";
      document.body.appendChild(tooltip);

      function placeTooltip(event) {
        const margin = 12;
        const rect = tooltip.getBoundingClientRect();
        let left = event.clientX + margin;
        let top = event.clientY + margin;
        if (left + rect.width > window.innerWidth - margin) {
          left = window.innerWidth - rect.width - margin;
        }
        if (top + rect.height > window.innerHeight - margin) {
          top = event.clientY - rect.height - margin;
        }
        tooltip.style.left = `${Math.max(margin, left)}px`;
        tooltip.style.top = `${Math.max(margin, top)}px`;
      }

      document.addEventListener("mouseover", (event) => {
        const target = event.target.closest(".has-tooltip");
        if (!target) return;
        tooltip.textContent = target.dataset.tooltip || "";
        tooltip.style.display = "block";
        placeTooltip(event);
      });

      document.addEventListener("mousemove", (event) => {
        if (tooltip.style.display === "block") {
          placeTooltip(event);
        }
      });

      document.addEventListener("mouseout", (event) => {
        if (event.target.closest(".has-tooltip")) {
          tooltip.style.display = "none";
        }
      });
    </script>
  </body>
</html>
