<!doctype html>
<!--
  Z.AI arXiv paper list.
  Author: Ellen Song <jiaqi.song@z.ai>
-->
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <title>Z.AI arXiv 论文列表</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f8fafc;
        --card: #ffffff;
        --foreground: #0f172a;
        --muted: #64748b;
        --muted-bg: #f1f5f9;
        --border: #e2e8f0;
        --accent: #0f172a;
        --accent-soft: #eef2ff;
        --accent-line: #c7d2fe;
        --product: #4338ca;
        --product-bg: #eef2ff;
        --academic: #047857;
        --academic-bg: #ecfdf5;
        --ring: rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        background-image:
          radial-gradient(circle at top left, rgba(99, 102, 241, 0.1), transparent 28rem),
          radial-gradient(circle at 80% 0, rgba(14, 165, 233, 0.08), transparent 24rem);
        color: var(--foreground);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 12px;
      }

      header {
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(16px);
        padding: 18px 24px 16px;
      }

      .wrap {
        max-width: 1600px;
        margin: 0 auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-logo {
        flex: 0 0 auto;
        width: 42px;
        height: 42px;
        border-radius: 10px;
        object-fit: cover;
      }

      h1 {
        margin: 0;
        font-size: clamp(20px, 2.4vw, 28px);
        letter-spacing: -0.04em;
        line-height: 1.15;
      }

      main {
        max-width: 1600px;
        margin: 14px auto 40px;
        padding: 0 24px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 16px 48px rgba(15, 23, 42, 0.06);
        padding: 12px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .stat {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        background: linear-gradient(180deg, #ffffff, #f8fafc);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
      }

      .stat b {
        display: block;
        color: var(--foreground);
        font-size: 17px;
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .stat span {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) 150px 150px 76px;
        gap: 8px;
        margin: 10px 0;
      }

      .topic-filter-bar {
        margin: 0 0 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 10px;
        background: #f8fafc;
      }

      .topic-filter-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 7px;
      }

      .topic-filter-title b {
        font-size: 11.5px;
      }

      .topic-filter-list {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      .filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 7px;
        background: white;
        color: #334155;
        font: inherit;
        font-size: 10.5px;
        line-height: 1;
        cursor: pointer;
      }

      .filter-chip:hover {
        border-color: var(--accent-line);
        background: var(--accent-soft);
      }

      .filter-chip[aria-pressed="true"] {
        border-color: #6366f1;
        background: #4f46e5;
        color: white;
      }

      .filter-chip:focus-visible,
      .topic-clear:focus-visible {
        outline: 2px solid #818cf8;
        outline-offset: 2px;
      }

      .filter-count {
        color: var(--muted);
        font-size: 9.5px;
      }

      .filter-chip[aria-pressed="true"] .filter-count {
        color: #e0e7ff;
      }

      .topic-clear {
        border: 0;
        padding: 2px 0;
        background: transparent;
        color: #4f46e5;
        font: inherit;
        font-size: 10.5px;
        cursor: pointer;
      }

      .topic-clear[hidden] {
        display: none;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 8px 10px;
        font: inherit;
        background: white;
        color: var(--foreground);
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--ring);
        outline: none;
      }

      .action-button {
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 8px 12px;
        background: white;
        color: var(--foreground);
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      .action-button:hover {
        border-color: var(--accent-line);
        background: var(--accent-soft);
      }

      .action-button:focus-visible {
        outline: 2px solid #818cf8;
        outline-offset: 2px;
      }

      .action-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .export-toggle[aria-pressed="true"],
      .export-download {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      .export-toggle[aria-pressed="true"]:hover,
      .export-download:hover:not(:disabled) {
        border-color: #334155;
        background: #334155;
      }

      .export-panel {
        display: grid;
        grid-template-columns: 150px minmax(420px, 1fr) 130px auto;
        align-items: center;
        gap: 16px;
        margin-bottom: 10px;
        border: 1px solid var(--accent-line);
        border-radius: 10px;
        padding: 10px;
        background: var(--accent-soft);
      }

      .export-panel[hidden] {
        display: none;
      }

      .export-panel fieldset {
        min-width: 0;
        margin: 0;
        border: 0;
        padding: 0;
      }

      .export-panel legend {
        margin-bottom: 6px;
        padding: 0;
        color: var(--muted);
        font-size: 10.5px;
        font-weight: 650;
      }

      .export-selection,
      .export-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .export-selection {
        flex-wrap: wrap;
      }

      .export-selection b {
        color: #4338ca;
        font-size: 10.5px;
        white-space: nowrap;
      }

      .check-options {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
      }

      .check-option {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
        cursor: pointer;
      }

      .check-option input,
      .paper-checkbox {
        width: 14px;
        height: 14px;
        margin: 0;
        padding: 0;
        accent-color: #4f46e5;
      }

      .paper-cell-layout {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .paper-cell-layout .paper-preview-button {
        min-width: 0;
      }

      .paper-checkbox {
        flex: 0 0 auto;
        margin-top: 2px;
      }

      tbody tr.is-selected td {
        background: #f5f3ff;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
        max-width: 100%;
      }

      table {
        width: 100%;
        min-width: 1320px;
        table-layout: fixed;
        border-collapse: collapse;
        background: white;
        font-size: 11.5px;
      }

      th,
      td {
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        text-align: left;
      }

      tbody td:first-child {
        padding-top: 8px;
        padding-bottom: 8px;
      }

      th:last-child,
      td:last-child {
        padding-right: 6px;
        padding-left: 6px;
      }

      th {
        position: sticky;
        top: 0;
        background: #f8fafc;
        color: var(--muted);
        z-index: 1;
        height: 30px;
        font-size: 11px;
        font-weight: 650;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      tbody tr:hover td {
        background: #f8fafc;
      }

      .title {
        color: var(--foreground);
        font-size: 12px;
        font-weight: 680;
        line-height: 1.32;
      }

      .translation {
        color: var(--muted);
        font-size: 11.25px;
        line-height: 1.32;
        margin-top: 3px;
      }

      .authors {
        color: #3f3f46;
      }

      .institutions {
        color: #475569;
      }

      .id-pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #f8fafc;
        color: #27272a;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
        font-size: 10.5px;
        line-height: 1;
        padding: 3px 6px;
        white-space: nowrap;
      }

      .tag-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 650;
        line-height: 1;
        padding: 4px 8px;
        white-space: nowrap;
      }

      .tag-product {
        background: var(--product-bg);
        color: var(--product);
      }

      .tag-support {
        background: #fff7ed;
        color: #c2410c;
      }

      .tag-academic {
        background: var(--academic-bg);
        color: var(--academic);
      }

      .topic-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
      }

      .topic-pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid #dbeafe;
        border-radius: 999px;
        padding: 3px 6px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 10.5px;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
      }

      .links {
        white-space: nowrap;
      }

      .links a + a {
        margin-left: 4px;
      }

      .date-cell {
        white-space: nowrap;
      }

      .truncate {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .has-tooltip {
        cursor: help;
      }

      .paper-preview-button {
        display: block;
        width: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }

      .paper-preview-button:hover .title,
      .paper-preview-button:focus-visible .title {
        color: #4338ca;
      }

      .paper-preview-button:focus-visible {
        border-radius: 4px;
        outline: 2px solid #818cf8;
        outline-offset: 2px;
      }

      .tooltip {
        position: fixed;
        z-index: 100;
        width: max-content;
        max-width: min(640px, calc(100vw - 24px));
        max-height: min(50vh, 360px);
        overflow: auto;
        border: 1px solid #cbd5e1;
        border-radius: 9px;
        padding: 8px 10px;
        background: #0f172a;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.22);
        color: #f8fafc;
        font-size: 11.5px;
        line-height: 1.5;
        pointer-events: auto;
        white-space: pre-wrap;
      }

      .tooltip[hidden] {
        display: none;
      }

      .preview-dialog {
        width: min(760px, calc(100vw - 28px));
        max-height: min(84vh, 760px);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 0;
        background: white;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.28);
        color: var(--foreground);
      }

      .preview-dialog::backdrop {
        background: rgba(15, 23, 42, 0.48);
        backdrop-filter: blur(3px);
      }

      .preview-content {
        padding: 22px;
      }

      .preview-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .preview-header h2 {
        margin: 0;
        font-size: 19px;
        line-height: 1.35;
      }

      .preview-translation {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .preview-close {
        flex: 0 0 auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 8px;
        background: white;
        color: var(--muted);
        font: inherit;
        cursor: pointer;
      }

      .preview-meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin: 18px 0;
      }

      .preview-field {
        min-width: 0;
        border-radius: 10px;
        padding: 10px 12px;
        background: var(--muted-bg);
      }

      .preview-field b,
      .preview-abstract b {
        display: block;
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 10.5px;
        letter-spacing: 0.05em;
      }

      .preview-field p,
      .preview-abstract p {
        margin: 0;
        line-height: 1.65;
      }

      .preview-abstract {
        border-top: 1px solid var(--border);
        padding-top: 16px;
      }

      .preview-links {
        display: flex;
        gap: 6px;
        margin-top: 18px;
      }

      a {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 7px;
        background: white;
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }

      a:hover {
        border-color: var(--accent-line);
        background: var(--accent-soft);
        text-decoration: none;
      }

      .empty,
      .meta {
        color: var(--muted);
      }

      .meta {
        font-size: 11.5px;
        margin: 0 0 8px;
      }

      @media (max-width: 760px) {
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        .export-panel {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .preview-meta {
          grid-template-columns: 1fr;
        }

        main {
          padding: 0 14px;
        }

        .brand-logo {
          width: 36px;
          height: 36px;
          border-radius: 9px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="brand">
          <img class="brand-logo" src="./logo-cropped.png" alt="Z.AI" />
          <h1>Z.AI arXiv 论文列表</h1>
        </div>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="stats" id="stats"></div>
        <div class="toolbar">
          <input id="search" type="search" placeholder="搜索标题、作者、机构、标签或 arXiv ID" />
          <select id="tag">
            <option value="">全部关联</option>
            <option value="产品相关">产品相关</option>
            <option value="产品技术支持">产品技术支持</option>
            <option value="非产品相关">非产品相关</option>
          </select>
          <select id="year">
            <option value="">全部年份</option>
          </select>
          <button class="action-button export-toggle" id="export-toggle" type="button"
            aria-pressed="false" disabled>导出</button>
        </div>
        <div class="topic-filter-bar">
          <div class="topic-filter-header">
            <div class="topic-filter-title"><b>Tag 筛选</b></div>
            <button class="topic-clear" id="topic-clear" type="button" hidden>清除</button>
          </div>
          <div class="topic-filter-list" id="topic-filters"></div>
        </div>
        <div class="export-panel" id="export-panel" hidden>
          <div class="export-selection">
            <label class="check-option">
              <input id="select-visible" type="checkbox" />
              全选当前结果
            </label>
            <b id="selected-count">已选 0 篇</b>
          </div>
          <fieldset>
            <legend>导出内容</legend>
            <div class="check-options">
              <label class="check-option"><input type="checkbox" name="export-field" value="title" checked />论文名</label>
              <label class="check-option"><input type="checkbox" name="export-field" value="translated_title" checked />论文译名</label>
              <label class="check-option"><input type="checkbox" name="export-field" value="authors" checked />作者</label>
              <label class="check-option"><input type="checkbox" name="export-field" value="arxiv_url" checked />arXiv 链接</label>
              <label class="check-option"><input type="checkbox" name="export-field" value="pdf_url" checked />PDF 链接</label>
            </div>
          </fieldset>
          <fieldset>
            <legend>文件格式</legend>
            <div class="check-options">
              <label class="check-option"><input type="radio" name="export-format" value="xlsx" checked />XLSX</label>
              <label class="check-option"><input type="radio" name="export-format" value="docx" />DOCX</label>
            </div>
          </fieldset>
          <div class="export-actions">
            <button class="action-button export-download" id="export-download" type="button" disabled>下载</button>
          </div>
        </div>
        <p class="meta" id="meta">加载中...</p>
        <div class="table-wrap">
          <table>
            <colgroup>
              <col style="width: 30%" />
              <col style="width: 15%" />
              <col style="width: 9%" />
              <col style="width: 8%" />
              <col style="width: 17%" />
              <col style="width: 7%" />
              <col style="width: 6%" />
              <col style="width: 8%" />
            </colgroup>
            <thead>
              <tr>
                <th>论文</th>
                <th>作者</th>
                <th>机构</th>
                <th>关联</th>
                <th>方向</th>
                <th>arXiv 号</th>
                <th>发表时间</th>
                <th>链接</th>
              </tr>
            </thead>
            <tbody id="papers"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div class="tooltip" id="paper-tooltip" role="tooltip" hidden></div>

    <dialog class="preview-dialog" id="paper-preview">
      <div class="preview-content">
        <div class="preview-header">
          <div>
            <h2 id="preview-title"></h2>
            <p class="preview-translation" id="preview-translation"></p>
          </div>
          <form method="dialog">
            <button class="preview-close" type="submit" aria-label="关闭">关闭</button>
          </form>
        </div>
        <div class="preview-meta">
          <div class="preview-field">
            <b>作者</b>
            <p id="preview-authors"></p>
          </div>
          <div class="preview-field">
            <b>机构</b>
            <p id="preview-institutions"></p>
          </div>
          <div class="preview-field">
            <b>分类</b>
            <div class="topic-tags" id="preview-tags"></div>
          </div>
          <div class="preview-field">
            <b>发表信息</b>
            <p id="preview-publication"></p>
          </div>
        </div>
        <div class="preview-abstract">
          <b>论文概览</b>
          <p id="preview-abstract"></p>
        </div>
        <div class="preview-links">
          <a id="preview-arxiv" target="_blank" rel="noreferrer">arXiv</a>
          <a id="preview-pdf" target="_blank" rel="noreferrer">PDF</a>
        </div>
      </div>
    </dialog>

    <script src="./export.js"></script>
    <script>
      const state = {
        rows: [],
        visibleRows: [],
        selectedTopics: new Set(),
        selectedPaperIds: new Set(),
        summary: {},
        exportMode: false,
      };
      const $ = (id) => document.getElementById(id);
      let tooltipHideTimer = null;
      let tooltipTarget = null;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderStats(summary) {
        const items = [
          ["最终收录", summary.final_count],
          ["产品相关", summary.product_related],
          ["产品技术支持", summary.product_support],
          ["非产品相关", summary.academic_output],
        ];
        $("stats").innerHTML = items
          .map(([label, value]) => `<div class="stat"><b>${value ?? "-"}</b><span>${label}</span></div>`)
          .join("");
      }

      function renderYears(rows) {
        const years = [...new Set(rows.map((row) => row.published.slice(0, 4)))].sort().reverse();
        $("year").insertAdjacentHTML(
          "beforeend",
          years.map((year) => `<option value="${year}">${year}</option>`).join("")
        );
      }

      function renderTopics(rows) {
        const counts = new Map();
        rows.forEach((row) => {
          row.topic_tags.forEach((topic) => {
            counts.set(topic, (counts.get(topic) || 0) + 1);
          });
        });
        const topics = [...counts].sort(
          ([leftTopic, leftCount], [rightTopic, rightCount]) =>
            rightCount - leftCount || leftTopic.localeCompare(rightTopic, "zh-CN")
        );
        $("topic-filters").innerHTML = topics
          .map(
            ([topic, count]) => `
              <button class="filter-chip" type="button" data-filter-topic="${escapeHtml(topic)}"
                aria-pressed="false">
                ${escapeHtml(topic)} <span class="filter-count">${count}</span>
              </button>`
          )
          .join("");
      }

      function updateTopicFilters() {
        document.querySelectorAll("[data-filter-topic]").forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(state.selectedTopics.has(button.dataset.filterTopic))
          );
        });
        $("topic-clear").hidden = state.selectedTopics.size === 0;
      }

      function hideTooltip() {
        window.clearTimeout(tooltipHideTimer);
        tooltipHideTimer = null;
        tooltipTarget = null;
        $("paper-tooltip").hidden = true;
      }

      function scheduleTooltipHide() {
        window.clearTimeout(tooltipHideTimer);
        tooltipHideTimer = window.setTimeout(hideTooltip, 120);
      }

      function showTooltip(target) {
        window.clearTimeout(tooltipHideTimer);
        tooltipHideTimer = null;
        const content = target.dataset.tooltip;
        if (!content) {
          hideTooltip();
          return;
        }

        tooltipTarget = target;
        const tooltip = $("paper-tooltip");
        tooltip.textContent = content;
        tooltip.hidden = false;
        tooltip.style.left = "0";
        tooltip.style.top = "0";

        const targetRect = target.getBoundingClientRect();
        const tooltipRect = tooltip.getBoundingClientRect();
        const margin = 12;
        const gap = 6;
        const left = Math.min(
          Math.max(margin, targetRect.left),
          window.innerWidth - tooltipRect.width - margin
        );
        const below = targetRect.bottom + gap;
        const top =
          below + tooltipRect.height <= window.innerHeight - margin
            ? below
            : Math.max(margin, targetRect.top - tooltipRect.height - gap);
        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top}px`;
      }

      function renderTopicPills(tags) {
        return tags
          .map((topic) => `<span class="topic-pill">${escapeHtml(topic)}</span>`)
          .join("");
      }

      function openPreview(arxivId) {
        const row = state.rows.find((item) => item.arxiv_id === arxivId);
        if (!row) {
          return;
        }

        hideTooltip();
        $("preview-title").textContent = row.title;
        $("preview-translation").textContent = row.translated_title || "";
        $("preview-authors").textContent = row.authors || "未提供";
        $("preview-institutions").textContent = row.institutions.length
          ? row.institutions.join(" · ")
          : "未提供";
        $("preview-tags").innerHTML = [
          `<span class="tag-pill ${tagClassFor(row.tag)}">${escapeHtml(row.tag)}</span>`,
          renderTopicPills(row.topic_tags),
        ].join("");
        $("preview-publication").textContent = `${row.published || "未知"} · arXiv:${row.arxiv_id}`;
        $("preview-abstract").textContent = row.abstract || "arXiv 暂未提供论文概览。";
        $("preview-arxiv").href = row.arxiv_url;
        $("preview-pdf").href = row.pdf_url;
        $("paper-preview").showModal();
      }

      function tagClassFor(tag) {
        if (tag === "产品相关") {
          return "tag-product";
        }
        if (tag === "产品技术支持") {
          return "tag-support";
        }
        return "tag-academic";
      }

      function updateExportControls() {
        if (!state.exportMode) {
          return;
        }
        const visibleIds = state.visibleRows.map((row) => row.arxiv_id);
        const selectedVisible = visibleIds.filter((id) => state.selectedPaperIds.has(id)).length;
        const selectVisible = $("select-visible");
        selectVisible.checked = visibleIds.length > 0 && selectedVisible === visibleIds.length;
        selectVisible.indeterminate = selectedVisible > 0 && selectedVisible < visibleIds.length;
        selectVisible.disabled = visibleIds.length === 0;
        $("selected-count").textContent = `已选 ${state.selectedPaperIds.size} 篇`;
        $("export-download").disabled =
          state.selectedPaperIds.size === 0 || selectedExportFields().length === 0;
      }

      function setExportMode(enabled) {
        state.exportMode = enabled;
        if (!enabled) {
          state.selectedPaperIds.clear();
        }
        $("export-panel").hidden = !enabled;
        $("export-toggle").setAttribute("aria-pressed", String(enabled));
        $("export-toggle").textContent = enabled ? "完成" : "导出";
        render();
      }

      function selectedExportFields() {
        return [...document.querySelectorAll('input[name="export-field"]:checked')].map(
          (input) => input.value
        );
      }

      function exportSelectedPapers() {
        const rows = state.rows.filter((row) => state.selectedPaperIds.has(row.arxiv_id));
        const fields = selectedExportFields();
        if (!rows.length || !fields.length) {
          return;
        }

        const format = document.querySelector('input[name="export-format"]:checked').value;
        const now = new Date();
        const date = [now.getFullYear(), now.getMonth() + 1, now.getDate()]
          .map((part) => String(part).padStart(2, "0"))
          .join("-");
        if (format === "docx") {
          const file = OfficeExport.buildDocx(rows, fields);
          OfficeExport.download(
            file,
            `zai-papers-${date}.docx`,
            "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
          );
          return;
        }
        const file = OfficeExport.buildXlsx(rows, fields);
        OfficeExport.download(
          file,
          `zai-papers-${date}.xlsx`,
          "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        );
      }

      function render() {
        const query = $("search").value.trim().toLowerCase();
        const year = $("year").value;
        const tag = $("tag").value;
        const rows = state.rows.filter((row) => {
          const haystack = [
            row.title,
            row.authors,
            row.translated_title,
            row.institutions.join(" "),
            row.topic_tags.join(" "),
            row.abstract,
            row.arxiv_id,
            row.tag,
          ]
            .join(" ")
            .toLowerCase();
          return (
            (!year || row.published.startsWith(year)) &&
            (!tag || row.tag === tag) &&
            [...state.selectedTopics].every((topic) => row.topic_tags.includes(topic)) &&
            (!query || haystack.includes(query))
          );
        });
        state.visibleRows = rows;

        $("meta").textContent = `显示 ${rows.length} / ${state.rows.length} 篇；更新于 ${
          state.summary.updated_at ? new Date(state.summary.updated_at).toLocaleString("zh-CN") : "未知"
        }`;

        $("papers").innerHTML =
          rows
            .map((row) => {
              const title = escapeHtml(row.title);
              const translatedTitle = escapeHtml(row.translated_title || "");
              const titleTooltip = escapeHtml(
                [row.title, row.translated_title].filter(Boolean).join("\n")
              );
              const authors = escapeHtml(row.authors);
              const institutionsText = row.institutions.length
                ? row.institutions.join(" · ")
                : "未提供";
              const institutions = escapeHtml(institutionsText);
              const tag = escapeHtml(row.tag || "非产品相关");
              const tagClass = tagClassFor(row.tag);
              const topicTags = renderTopicPills(row.topic_tags);
              const arxivId = escapeHtml(row.arxiv_id);
              const published = escapeHtml(row.published || "");
              const arxivUrl = escapeHtml(row.arxiv_url);
              const pdfUrl = escapeHtml(row.pdf_url);
              const isSelected = state.selectedPaperIds.has(row.arxiv_id);
              const checkbox = state.exportMode
                ? `<input class="paper-checkbox" type="checkbox" data-select-paper="${arxivId}"
                    aria-label="选择 ${title}" ${isSelected ? "checked" : ""} />`
                : "";
              return `
                <tr class="${isSelected ? "is-selected" : ""}">
                  <td>
                    <div class="paper-cell-layout">
                      ${checkbox}
                      <button class="paper-preview-button has-tooltip" type="button"
                        data-paper-id="${arxivId}" data-tooltip="${titleTooltip}"
                        aria-label="打开 ${title} 的论文概览">
                        <span class="title truncate">${title}</span>
                        <span class="translation truncate">${translatedTitle}</span>
                      </button>
                    </div>
                  </td>
                  <td><span class="authors truncate has-tooltip" data-tooltip="${authors}">${authors}</span></td>
                  <td><span class="institutions truncate has-tooltip" data-tooltip="${institutions}">${institutions}</span></td>
                  <td><span class="tag-pill ${tagClass}">${tag}</span></td>
                  <td><div class="topic-tags">${topicTags}</div></td>
                  <td><span class="id-pill">${arxivId}</span></td>
                  <td class="date-cell">${published}</td>
                  <td class="links">
                    <a href="${arxivUrl}" target="_blank" rel="noreferrer">arXiv</a>
                    <a href="${pdfUrl}" target="_blank" rel="noreferrer">PDF</a>
                  </td>
                </tr>`;
            })
            .join("") || `<tr><td colspan="8" class="empty">没有匹配结果</td></tr>`;
        updateExportControls();
      }

      fetch("./data/zhipu_papers.json", { cache: "no-store" })
        .then((response) => response.json())
        .then((data) => {
          state.rows = (data.rows || []).map((row) => ({
            ...row,
            tag: row.tag || "非产品相关",
            topic_tags: Array.isArray(row.topic_tags) ? row.topic_tags : [],
            institutions: Array.isArray(row.institutions) ? row.institutions : [],
            abstract: row.abstract || "",
          }));
          state.summary = {
            ...(data.summary || {}),
            final_count: state.rows.length,
            product_related: state.rows.filter((row) => row.tag === "产品相关").length,
            product_support: state.rows.filter((row) => row.tag === "产品技术支持").length,
            academic_output: state.rows.filter((row) => row.tag === "非产品相关").length,
          };
          renderStats(state.summary);
          renderYears(state.rows);
          renderTopics(state.rows);
          $("export-toggle").disabled = false;
          render();
        })
        .catch((error) => {
          $("meta").textContent = `加载失败：${error.message}`;
        });

      $("search").addEventListener("input", render);
      $("tag").addEventListener("change", render);
      $("year").addEventListener("change", render);
      $("topic-filters").addEventListener("click", (event) => {
        const target = event.target.closest("[data-filter-topic]");
        if (!target) {
          return;
        }
        const topic = target.dataset.filterTopic;
        if (state.selectedTopics.has(topic)) {
          state.selectedTopics.delete(topic);
        } else {
          state.selectedTopics.add(topic);
        }
        updateTopicFilters();
        render();
      });
      $("topic-clear").addEventListener("click", () => {
        state.selectedTopics.clear();
        updateTopicFilters();
        render();
      });
      $("export-toggle").addEventListener("click", () => {
        setExportMode(!state.exportMode);
      });
      $("select-visible").addEventListener("change", (event) => {
        state.visibleRows.forEach((row) => {
          if (event.target.checked) {
            state.selectedPaperIds.add(row.arxiv_id);
          } else {
            state.selectedPaperIds.delete(row.arxiv_id);
          }
        });
        render();
      });
      document.querySelectorAll('input[name="export-field"]').forEach((input) => {
        input.addEventListener("change", updateExportControls);
      });
      $("export-download").addEventListener("click", exportSelectedPapers);
      $("papers").addEventListener("change", (event) => {
        const target = event.target.closest("[data-select-paper]");
        if (!target) {
          return;
        }
        if (target.checked) {
          state.selectedPaperIds.add(target.dataset.selectPaper);
        } else {
          state.selectedPaperIds.delete(target.dataset.selectPaper);
        }
        target.closest("tr").classList.toggle("is-selected", target.checked);
        updateExportControls();
      });
      $("papers").addEventListener("click", (event) => {
        const target = event.target.closest("[data-paper-id]");
        if (target) {
          openPreview(target.dataset.paperId);
        }
      });
      $("paper-preview").addEventListener("click", (event) => {
        if (event.target === $("paper-preview")) {
          $("paper-preview").close();
        }
      });
      document.addEventListener("mouseover", (event) => {
        const target = event.target.closest("[data-tooltip]");
        if (target && target !== tooltipTarget) {
          showTooltip(target);
        }
      });
      document.addEventListener("mouseout", (event) => {
        if (tooltipTarget && !tooltipTarget.contains(event.relatedTarget)) {
          scheduleTooltipHide();
        }
      });
      $("paper-tooltip").addEventListener("mouseenter", () => {
        window.clearTimeout(tooltipHideTimer);
        tooltipHideTimer = null;
      });
      $("paper-tooltip").addEventListener("mouseleave", scheduleTooltipHide);
      window.addEventListener("resize", hideTooltip);
      window.addEventListener("scroll", hideTooltip, true);
    </script>
  </body>
</html>
