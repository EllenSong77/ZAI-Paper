name: Update and deploy Pages

on:
  workflow_dispatch:
    inputs:
      sync_mode:
        description: "arXiv sync mode: incremental or full"
        required: false
        default: "incremental"
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .cache
          key: zhipu-review-cache-${{ github.run_id }}
          restore-keys: |
            zhipu-review-cache-

      - run: pip install -r requirements.txt

      - name: Update paper data
        run: python search_papers.py
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_CLASSIFIER_MODEL: glm-5-turbo
          ARXIV_SYNC_MODE: ${{ github.event.inputs.sync_mode || 'incremental' }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/zhipu_papers.json
          if git diff --cached --quiet; then
            echo "No paper updates."
          else
            git commit -m "Update arXiv paper data"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
